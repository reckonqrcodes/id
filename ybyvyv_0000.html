                <div class="w-full max-w-[380px] rounded-[40px] p-1.5 shadow-2xl mx-auto bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 relative overflow-hidden group">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-30 mix-blend-overlay"></div>
                    <div class="bg-white/20 backdrop-blur-2xl border border-white/50 rounded-[36px] p-8 text-center shadow-[inset_0_0_20px_rgba(255,255,255,0.2)] relative z-10 transition-all duration-500 group-hover:bg-white/30">
                        <div class="w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-tr from-white/40 to-white/10 mb-5 shadow-[0_0_25px_rgba(255,255,255,0.4)]">

                        <p class="text-white text-xs italic mt-5 mb-5 bg-white/10 backdrop-blur-sm p-4 rounded-xl border border-white/30 drop-shadow-md">"Welcome to my digital profile."</p>
                        
                        <div class="bg-black/10 backdrop-blur-sm border border-white/20 rounded-2xl p-4 mt-4 text-left space-y-3 shadow-inner">
                            <a href="tel:000-000-0000" class="flex items-center justify-between hover:bg-white/10 p-2 rounded-lg transition text-white drop-shadow-md">

                        <button onclick="downloadVCard()" class="no-print w-full mt-6 bg-white/90 text-purple-900 font-black py-4 rounded-2xl shadow-[0_5px_15px_rgba(0,0,0,0.3)] uppercase tracking-widest text-[11px] hover:bg-white hover:scale-105 transition active:scale-95 border border-white">Save Contact</button>
                    </div>
                </div>
    <script>function downloadVCard(){const blob=new Blob([`BEGIN:VCARD
VERSION:3.0
FN:Ybyvyv
ORG:
TITLE:
TEL;TYPE=CELL:
TEL;TYPE=WORK:
EMAIL:
URL:
ADR:;;;;;;
END:VCARD`],{type:'text/vcard'});const url=window.URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='Ybyvyv.vcf';document.body.appendChild(a);a.click();window.URL.revokeObjectURL(url);}</script>
